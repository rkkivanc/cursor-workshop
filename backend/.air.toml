root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o tmp/server ./cmd/server"
  entrypoint = "tmp/server"
  delay = 1000
  exclude_dir = ["assets", "tmp", "vendor", "deployments", "internal/infrastructure/graphql/generated"]
  exclude_file = []
  exclude_regex = ["_test.go", "_gen.go"]
  exclude_unchanged = false
  follow_symlink = false
  full_bin = ""
  include_dir = []
  include_ext = ["go", "tpl", "tmpl", "html", "graphqls"]
  kill_delay = "0s"
  log = "build-errors.log"
  send_interrupt = false
  stop_on_error = true

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  time = false

[misc]
  clean_on_exit = false

[screen]
  clear_on_rebuild = false
